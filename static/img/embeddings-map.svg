<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 380" font-family="Inter, system-ui, sans-serif" role="img" aria-label="Embeddings cluster map: words with similar meaning sit near each other">
  <rect x="3" y="3" width="654" height="374" rx="14" fill="#1e1b2b" stroke="#34304a"/>
  <text x="28" y="40" fill="#e2e0ea" font-size="19" font-weight="700">Embeddings — meaning becomes position</text>
  <text x="28" y="62" fill="#94a3b8" font-size="13">Texts with similar meaning land near each other in space.</text>

  <ellipse cx="150" cy="158" rx="80" ry="60" fill="#a78bfa" fill-opacity="0.08" stroke="#a78bfa" stroke-opacity="0.4" stroke-dasharray="4 4"/>
  <text x="110" y="112" fill="#a78bfa" font-size="11.5" font-weight="600">ROYALTY</text>
  <circle cx="120" cy="138" r="5" fill="#a78bfa"/><text x="130" y="142" fill="#cbd5e1" font-size="12.5">king</text>
  <circle cx="178" cy="152" r="5" fill="#a78bfa"/><text x="188" y="156" fill="#cbd5e1" font-size="12.5">queen</text>
  <circle cx="135" cy="188" r="5" fill="#a78bfa"/><text x="145" y="192" fill="#cbd5e1" font-size="12.5">prince</text>

  <ellipse cx="520" cy="152" rx="76" ry="56" fill="#5eead4" fill-opacity="0.08" stroke="#5eead4" stroke-opacity="0.4" stroke-dasharray="4 4"/>
  <text x="498" y="106" fill="#5eead4" font-size="11.5" font-weight="600">PETS</text>
  <circle cx="500" cy="136" r="5" fill="#5eead4"/><text x="510" y="140" fill="#cbd5e1" font-size="12.5">dog</text>
  <circle cx="550" cy="156" r="5" fill="#5eead4"/><text x="560" y="160" fill="#cbd5e1" font-size="12.5">cat</text>
  <circle cx="500" cy="180" r="5" fill="#5eead4"/><text x="510" y="184" fill="#cbd5e1" font-size="12.5">hamster</text>

  <ellipse cx="335" cy="292" rx="82" ry="50" fill="#fbbf24" fill-opacity="0.08" stroke="#fbbf24" stroke-opacity="0.4" stroke-dasharray="4 4"/>
  <text x="302" y="334" fill="#fbbf24" font-size="11.5" font-weight="600">CITIES</text>
  <circle cx="302" cy="286" r="5" fill="#fbbf24"/><text x="312" y="290" fill="#cbd5e1" font-size="12.5">Paris</text>
  <circle cx="358" cy="300" r="5" fill="#fbbf24"/><text x="368" y="304" fill="#cbd5e1" font-size="12.5">Tokyo</text>
  <circle cx="328" cy="262" r="5" fill="#fbbf24"/><text x="338" y="266" fill="#cbd5e1" font-size="12.5">Berlin</text>

  <text x="28" y="366" fill="#94a3b8" font-size="12">Real embeddings have ~1,536 dimensions — this is a 2-D shadow of that space.</text>
</svg>
