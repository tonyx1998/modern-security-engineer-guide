<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 240" font-family="Inter, system-ui, sans-serif" role="img" aria-label="Context window budget: system prompt, chat history, retrieved docs and the answer share one fixed space">
  <rect x="3" y="3" width="654" height="234" rx="14" fill="#1e1b2b" stroke="#34304a"/>
  <text x="28" y="40" fill="#e2e0ea" font-size="19" font-weight="700">The context window is a fixed budget</text>
  <text x="28" y="62" fill="#94a3b8" font-size="13">Everything the model sees in one call shares one fixed space.</text>

  <text x="40" y="92" fill="#64748b" font-size="11.5">one call — e.g. 200,000 tokens total</text>

  <rect x="40"  y="100" width="70"  height="48" rx="6" fill="#a78bfa"/>
  <rect x="110" y="100" width="180" height="48" fill="#60a5fa"/>
  <rect x="290" y="100" width="180" height="48" fill="#5eead4"/>
  <rect x="470" y="100" width="40"  height="48" fill="#2a2740" stroke="#403a55" stroke-dasharray="3 3"/>
  <rect x="510" y="100" width="110" height="48" rx="6" fill="#fbbf24"/>

  <text x="75"  y="170" fill="#cbd5e1" font-size="11"   text-anchor="middle">system</text>
  <text x="200" y="170" fill="#0b0a18" font-size="11.5" text-anchor="middle">chat history</text>
  <text x="380" y="170" fill="#0b0a18" font-size="11.5" text-anchor="middle">retrieved docs (RAG)</text>
  <text x="490" y="170" fill="#94a3b8" font-size="10"   text-anchor="middle">free</text>
  <text x="565" y="170" fill="#0b0a18" font-size="11.5" text-anchor="middle">answer</text>

  <text x="28" y="208" fill="#94a3b8" font-size="12">When the bar fills up, the oldest chat history gets dropped (truncated) —</text>
  <text x="28" y="226" fill="#94a3b8" font-size="12">which is why long conversations start to "forget" earlier messages.</text>
</svg>
